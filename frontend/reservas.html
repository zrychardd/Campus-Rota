<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Rota — Minhas Reservas</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .reserva-card { background:#fff; border:0.5px solid #eee; border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 1px 4px #0001; }
    .reserva-rota { font-size:15px; font-weight:700; color:var(--text); }
    .reserva-data { font-size:12px; color:#aaa; margin-top:2px; }
    .status-badge { display:inline-block; font-size:11px; font-weight:700; padding:4px 12px; border-radius:20px; margin-top:8px; }
    .badge-aguardando  { background:#fff3cd; color:#856404; }
    .badge-confirmada  { background:#d4edda; color:#155724; }
    .badge-recusada    { background:#f8d7da; color:#721c24; }
    .empty-state { text-align:center; color:#bbb; font-size:13px; padding:40px 20px; }
    .empty-icon  { font-size:40px; margin-bottom:10px; }
    .reserva-detalhe { font-size:13px; color:#666; margin-top:6px; }
  </style>
</head>
<body>
<div class="phone" style="display:flex;flex-direction:column;min-height:640px">

  <div class="topbar">
    <div class="logo"><span class="logo-campus">CAMPUS</span><span class="logo-rota">ROTA</span></div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px 4px">
    <div style="font-size:20px;font-weight:700">Minhas Reservas</div>
  </div>

  <div style="flex:1;overflow-y:auto;padding:12px 20px" id="lista-reservas">
    <div class="empty-state"><div class="empty-icon">🪑</div>Carregando...</div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item" onclick="goTo('home-estudante.html')"><span class="ic">🏠</span><span>Home</span></button>
    <button class="nav-item" onclick="goTo('historico.html')"><span class="ic">🕐</span><span>Histórico</span></button>
    <button class="nav-item active"><span class="ic">🪑</span><span>Reservas</span></button>
    <button class="nav-item" onclick="goTo('perfil.html')"><span class="ic">👤</span><span>Perfil</span></button>
  </div>
</div>

<script>
  const BASE  = 'http://localhost:3001/api';
  const token = localStorage.getItem('cr_token');
  const user  = JSON.parse(localStorage.getItem('cr_user') || 'null');
  if (!token || !user) window.location.href = 'login.html';

  function goTo(p) { window.location.href = p; }
  function logout() {
    localStorage.removeItem('cr_token');
    localStorage.removeItem('cr_user');
    window.location.href = 'login.html';
  }

  function formatarHorario(valor) {
    if (!valor) return 'Horário a definir';
    const data = new Date(valor);
    if (Number.isNaN(data.getTime())) return 'Horário a definir';
    return data.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  }

  function badgeStatus(status) {
    const map = {
      AGUARDANDO: ['badge-aguardando', '⏳ Aguardando motorista'],
      CONFIRMADA: ['badge-confirmada', '✔ Viagem confirmada'],
      RECUSADA:   ['badge-recusada',   '✖ Recusada'],
    };
    const [cls, txt] = map[status] || ['badge-aguardando', status];
    return `<span class="status-badge ${cls}">${txt}</span>`;
  }

  async function carregarReservas() {
    const lista = document.getElementById('lista-reservas');
    try {
      const res     = await fetch(`${BASE}/reserva/minhas`, { headers: { Authorization: `Bearer ${token}` } });
      const reservas = await res.json();

      if (!reservas.length) {
        lista.innerHTML = `<div class="empty-state"><div class="empty-icon">🪑</div>Você ainda não fez nenhuma reserva.<br><br><a href="home-estudante.html" style="color:var(--blue);font-weight:600">Buscar uma viagem</a></div>`;
        return;
      }

      lista.innerHTML = reservas.map(r => `
        <div class="reserva-card">
          <div class="reserva-rota">📍 ${r.partida} → 🎓 ${r.destino}</div>
          <div class="reserva-data">Reserva feita em ${new Date(r.createdAt).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' })}</div>
          <div class="reserva-detalhe">🕐 Horário da viagem: <strong>${formatarHorario(r.horario)}</strong></div>
          ${badgeStatus(r.status)}
          ${r.status === 'CONFIRMADA' ? '<div class="reserva-detalhe">🚐 Motorista confirmou sua presença! Aguarde no ponto de partida.</div>' : ''}
          ${r.status === 'RECUSADA'   ? '<div class="reserva-detalhe">Tente reservar novamente ou escolha outro trajeto.</div>' : ''}
        </div>`).join('');
    } catch {
      lista.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div>Erro ao carregar reservas.</div>`;
    }
  }

  document.addEventListener('DOMContentLoaded', carregarReservas);
</script>
</body>
</html>
