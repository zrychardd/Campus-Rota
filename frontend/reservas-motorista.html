<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Rota — Reservas</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .reserva-card{background:#fff;border:0.5px solid #eee;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px #0001}
    .reserva-rota{font-size:15px;font-weight:700;color:var(--text)}
    .reserva-aluno{font-size:13px;color:#666;margin-top:4px}
    .reserva-data{font-size:11px;color:#aaa;margin-top:2px}
    .btn-row{display:flex;gap:8px;margin-top:12px}
    .btn-aceitar{flex:1;background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer}
    .btn-recusar{flex:1;background:#fff;color:#e53935;border:1.5px solid #e53935;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer}
    .btn-aceitar:hover{opacity:.9}
    .btn-recusar:hover{background:#fdecea}
    .status-badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px}
    .badge-aguardando{background:#fff3cd;color:#856404}
    .badge-confirmada{background:#d4edda;color:#155724}
    .badge-recusada{background:#f8d7da;color:#721c24}
    .empty-state{text-align:center;color:#bbb;font-size:13px;padding:40px 20px}
    .empty-icon{font-size:40px;margin-bottom:10px}
    .tabs{display:flex;border-bottom:0.5px solid #eee;margin:0 0 12px}
    .tab{flex:1;padding:10px;font-size:13px;font-weight:500;color:#888;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent}
    .tab.active{color:var(--blue);border-bottom:2px solid var(--green)}
  </style>
</head>
<body>
<div class="phone" style="display:flex;flex-direction:column;min-height:640px">

  <div class="topbar">
    <div class="logo"><span class="logo-campus">CAMPUS</span><span class="logo-rota">ROTA</span></div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px 8px">
    <div style="font-size:20px;font-weight:700">Reservas</div>
  </div>

  <!-- Abas -->
  <div class="tabs" style="margin:0 20px 12px">
    <button class="tab active" onclick="mudarAba(this,'AGUARDANDO')">Pendentes</button>
    <button class="tab" onclick="mudarAba(this,'CONFIRMADA')">Confirmadas</button>
    <button class="tab" onclick="mudarAba(this,'RECUSADA')">Recusadas</button>
  </div>

  <!-- Lista -->
  <div style="flex:1;overflow-y:auto;padding:0 20px" id="lista-reservas">
    <div class="empty-state"><div class="empty-icon">⏳</div>Carregando...</div>
  </div>

  <!-- Nav -->
  <div class="bottom-nav">
    <button class="nav-item" onclick="goTo('home-motorista.html')"><span class="ic">🏠</span><span>Home</span></button>
    <button class="nav-item" onclick="goTo('historico-motorista.html')"><span class="ic">🕐</span><span>Histórico</span></button>
    <button class="nav-item active"><span class="ic">🪑</span><span>Reservas</span></button>
    <button class="nav-item" onclick="goTo('perfil.html')"><span class="ic">👤</span><span>Perfil</span></button>
  </div>
</div>

<script>
  const BASE  = 'http://localhost:3001/api';
  const token = localStorage.getItem('cr_token');
  const user  = JSON.parse(localStorage.getItem('cr_user') || 'null');
  if (!token || !user) window.location.href = 'login.html';
  if (user && user.tipo !== 'MOTORISTA') window.location.href = 'home-estudante.html';

  let todasReservas = [];
  let abaAtiva = 'AGUARDANDO';

  function goTo(p) { window.location.href = p; }
  function logout() {
    localStorage.removeItem('cr_token');
    localStorage.removeItem('cr_user');
    window.location.href = 'login.html';
  }

  function mudarAba(btn, status) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    abaAtiva = status;
    renderReservas();
  }

  function formatarHorario(valor) {
    if (!valor) return 'Horário a definir';
    const data = new Date(valor);
    if (Number.isNaN(data.getTime())) return 'Horário a definir';
    return data.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  }

  function renderReservas() {
    const lista    = document.getElementById('lista-reservas');
    const filtradas = todasReservas.filter(r => r.status === abaAtiva);

    if (!filtradas.length) {
      const msgs = { AGUARDANDO:'Nenhuma reserva pendente.', CONFIRMADA:'Nenhuma reserva confirmada.', RECUSADA:'Nenhuma reserva recusada.' };
      lista.innerHTML = `<div class="empty-state"><div class="empty-icon">🪑</div>${msgs[abaAtiva]}</div>`;
      return;
    }

    lista.innerHTML = filtradas.map(r => `
      <div class="reserva-card" id="card-${r.id}">
        <div class="reserva-rota">📍 ${r.partida} → 🎓 ${r.destino}</div>
        <div class="reserva-aluno">👤 ${r.estudante?.nome || 'Estudante'} ${r.estudante?.sobrenome || ''}</div>
        <div class="reserva-data">🕐 Horário da viagem: <strong>${formatarHorario(r.horario)}</strong></div>
        <div class="reserva-data">Solicitada em ${new Date(r.createdAt).toLocaleDateString('pt-BR', {day:'2-digit',month:'long',hour:'2-digit',minute:'2-digit'})}</div>
        ${r.status === 'AGUARDANDO' ? `
          <div class="btn-row">
            <button class="btn-aceitar" onclick="acao('${r.id}','aceitar')">✔ Aceitar</button>
            <button class="btn-recusar" onclick="acao('${r.id}','recusar')">✖ Recusar</button>
          </div>` : `
          <span class="status-badge ${r.status === 'CONFIRMADA' ? 'badge-confirmada' : 'badge-recusada'}">
            ${r.status === 'CONFIRMADA' ? '✔ Confirmada' : '✖ Recusada'}
          </span>`}
      </div>`).join('');
  }

  async function acao(id, tipo) {
    const btn = document.querySelectorAll(`#card-${id} button`);
    btn.forEach(b => b.disabled = true);
    try {
      const res = await fetch(`${BASE}/reserva/${id}/${tipo}`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${token}` }
      });
      if (res.ok) {
        await carregarReservas();
      } else {
        const d = await res.json();
        alert(d.erro || 'Erro ao processar.');
        btn.forEach(b => b.disabled = false);
      }
    } catch {
      alert('Erro de conexão.');
      btn.forEach(b => b.disabled = false);
    }
  }

  async function carregarReservas() {
    try {
      const res = await fetch(`${BASE}/reserva/pendentes`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      todasReservas = await res.json();
      // Inclui também confirmadas e recusadas buscando todas
      const res2 = await fetch(`${BASE}/reserva/todas`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (res2.ok) todasReservas = await res2.json();
    } catch {
      todasReservas = [];
    }
    renderReservas();
  }

  document.addEventListener('DOMContentLoaded', carregarReservas);
</script>
</body>
</html>
